<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InsureSuite – CRM & Renewals</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="crm-page">

  <header class="suite-header">
    <h1>InsureSuite</h1>
    <div class="user-nav">
      <span id="sessionInfo"></span> •
      <a href="index.html">Logout</a>
    </div>
  </header>

  <nav class="main-menu">
    <a href="dashboard.html" class="menu-item">Dashboard</a>
    <a href="claims.html" class="menu-item">Claims</a>
    <a href="policies.html" class="menu-item">Policies</a>
    <a href="crm.html" class="menu-item active">CRM & Renewals</a>
    <a href="portfolio.html" class="menu-item">Portfolio</a>
    <a href="documents.html" class="menu-item">Documents</a>
    <a href="admin.html" class="menu-item">Admin</a>
  </nav>

  <main class="page-main">

    <section class="section-header">
      <h2>CRM & Renewals</h2>
      <button id="newCustomerBtn" class="btn btn-primary">New Customer</button>
    </section>

    <div id="customerFormWrap" class="form-card" style="display:none;">
      <h3>Add Customer</h3>
      <form id="customerForm">
        <div class="form-row">
          <label>Name</label>
          <input type="text" id="custName" required />
        </div>
        <div class="form-row">
          <label>National ID</label>
          <input type="text" id="custNid" />
        </div>
        <div class="form-row">
          <label>Phone</label>
          <input type="text" id="custPhone" />
        </div>
        <div class="form-row">
          <label>Email</label>
          <input type="email" id="custEmail" />
        </div>
        <div class="form-row">
          <button type="submit" class="btn btn-primary">Save Customer</button>
          <button type="button" id="cancelCustomerBtn" class="btn btn-secondary">Cancel</button>
        </div>
      </form>
    </div>

    <table id="customersTable" class="data-table">
      <thead>
        <tr>
          <th>Customer</th>
          <th>Contact</th>
          <th>Last Policy</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <section style="margin-top:2rem;">
      <h3>Renewals Pipeline (Next 30 Days)</h3>
      <table id="renewalsTable" class="data-table">
        <thead>
          <tr>
            <th>Policy #</th>
            <th>Customer</th>
            <th>Due Date</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

  </main>

  <script>
// DUMMY DATA FOR CRM PAGE
    window.data = {
      branches: [
        { id: 1, name: "Head Office – Blantyre", code: "BO" },
        { id: 2, name: "Lilongwe Branch", code: "LW" },
        { id: 3, name: "Mzuzu Branch", code: "MZ" }
      ],
      customers: [
        { id: 1, name: "Nyasa Insurance Agency", nid: "NIA-001", phone: "+265 111 111 111", email: "info@nyasa.co.mw", lastPolicy: "POL-2025-001", status: "Active" },
        { id: 2, name: "City Mall Ltd",         nid: "CML-002", phone: "+265 222 222 222", email: "accounts@citymall.co.mw", lastPolicy: "POL-2025-002", status: "Active" },
        { id: 3, name: "AutoPlus Ltd",          nid: "APL-003", phone: "+265 333 333 333", email: "ops@autoplus.co.mw", lastPolicy: "POL-2025-003", status: "Lapsed" },
        { id: 4, name: "Rural Transport Co-op", nid: "RTC-004", phone: "+265 444 444 444", email: "chair@rtc.coop", lastPolicy: "POL-2025-004", status: "Active" },
        { id: 5, name: "GreenGrocers Ltd",      nid: "GGL-005", phone: "+265 555 555 555", email: "sales@greengrocers.mw", lastPolicy: "POL-2025-005", status: "Active" }
      ],
      renewals: [
        { id: 1, policyNo: "POL-2025-001", customer: "Nyasa Insurance Agency", dueDate: "2025-04-05", status: "Pending" },
        { id: 2, policyNo: "POL-2025-002", customer: "City Mall Ltd",          dueDate: "2025-04-08", status: "ContactedPhone" },
        { id: 3, policyNo: "POL-2025-004", customer: "Rural Transport Co‑op", dueDate: "2025-04-12", status: "ContactedEmail" },
        { id: 4, policyNo: "POL-2025-005", customer: "GreenGrocers Ltd",      dueDate: "2025-04-15", status: "OfferSent" }
      ]
    };

    // APP LOGIC
    const app = {
      session: null,

      // Load stored session
      loadSession() {
        try {
          const s = localStorage.getItem("insuresuite-session");
          if (s) this.session = JSON.parse(s);
        } catch (e) {
          // ignore invalid JSON
        }
      },

      // Require valid session to show page
      requireSession() {
        if (!this.session) {
          window.location = "index.html";
          return false;
        }
        return true;
      },

      // Set role + branch in header
      setHeader() {
        const el = document.getElementById("sessionInfo");
        if (!el || !this.session) return;
        const branch = window.data.branches.find(b => b.id === this.session.branchId);
        el.textContent = `${this.session.role} • ${branch ? branch.name : "Unknown Branch"}`;
      },

      // Render customer list
      renderCustomers() {
        const tbody = document.querySelector("#customersTable tbody");
        if (!tbody) return;
        tbody.innerHTML = "";

        window.data.customers.forEach(c => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${c.name}</td>
            <td>${c.phone}<br><small>${c.email}</small></td>
            <td>${c.lastPolicy}</td>
            <td><span class="status-pill ${c.status.toLowerCase()}">${c.status}</span></td>
            <td>
              <button class="btn btn-xs btn-primary" data-id="${c.id}" data-action="view">View</button>
            </td>
          `;
          tbody.appendChild(tr);
        });

        tbody.querySelectorAll("button[data-action]").forEach(btn => {
          btn.addEventListener("click", () => {
            const id = parseInt(btn.dataset.id);
            const c = window.data.customers.find(x => x.id === id);
            if (!c) return;
            if (btn.dataset.action === "view") {
              alert(`Customer: ${c.name}
Contact: ${c.phone}
Email: ${c.email}
Last Policy: ${c.lastPolicy}`);
            }
          });
        });
      },

      // Render renewals
      renderRenewals() {
        const tbody = document.querySelector("#renewalsTable tbody");
        if (!tbody) return;
        tbody.innerHTML = "";

        window.data.renewals.forEach(r => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${r.policyNo}</td>
            <td>${r.customer}</td>
            <td>${r.dueDate}</td>
            <td><span class="status-pill ${r.status.toLowerCase()}">${r.status}</span></td>
            <td>
              <button class="btn btn-xs btn-primary" data-id="${r.id}" data-action="follow">Follow Up</button>
            </td>
          `;
          tbody.appendChild(tr);
        });

        tbody.querySelectorAll("button[data-action]").forEach(btn => {
          btn.addEventListener("click", () => {
            const id = parseInt(btn.dataset.id);
            const r = window.data.renewals.find(x => x.id === id);
            if (!r) return;
            if (btn.dataset.action === "follow") {
              alert(`Follow up: ${r.policyNo} for ${r.customer}`);
            }
          });
        });
      },

      // Customer form logic
      initForm() {
        const wrap = document.getElementById("customerFormWrap");
        const form = document.getElementById("customerForm");

        // Show form
        document.getElementById("newCustomerBtn").addEventListener("click", () => {
          wrap.style.display = "block";
        });

        // Hide form
        document.getElementById("cancelCustomerBtn").addEventListener("click", () => {
          wrap.style.display = "none";
        });

        // Submit new customer
        form.addEventListener("submit", (e) => {
          e.preventDefault();
          const newId = window.data.customers.reduce((m, c) => Math.max(m, c.id), 0) + 1;
          const name  = document.getElementById("custName").value.trim();
          const nid   = document.getElementById("custNid").value.trim();
          const phone = document.getElementById("custPhone").value.trim();
          const email = document.getElementById("custEmail").value.trim();

          window.data.customers.push({
            id: newId,
            name,
            nid,
            phone,
            email,
            lastPolicy: "—",
            status: "Active"
          });

          form.reset();
          wrap.style.display = "none";
          this.renderCustomers();
        });
      },

      // Initialize page
      init() {
        this.loadSession();
        if (!this.requireSession()) return;
        this.setHeader();
        this.renderCustomers();
        this.renderRenewals();
        this.initForm();
      }
    };

    // Run on page load
    document.addEventListener("DOMContentLoaded", () => app.init());
  </script>
</body>
</html>
