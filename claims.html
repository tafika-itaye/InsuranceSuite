<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InsureSuite – Claims</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="claims-page">

  <header class="suite-header">
    <h1>InsureSuite</h1>
    <div class="user-nav">
      <span id="sessionInfo"></span> •
      <a href="index.html">Logout</a>
    </div>
  </header>

  <nav class="main-menu">
    <a href="dashboard.html" class="menu-item">Dashboard</a>
    <a href="claims.html" class="menu-item active">Claims</a>
    <a href="policies.html" class="menu-item">Policies</a>
    <a href="crm.html" class="menu-item">CRM & Renewals</a>
    <a href="portfolio.html" class="menu-item">Portfolio</a>
    <a href="documents.html" class="menu-item">Documents</a>
    <a href="admin.html" class="menu-item">Admin</a>
  </nav>

  <main class="page-main">

    <section class="section-header">
      <h2>Claims Management</h2>
      <button id="newClaimBtn" class="btn btn-primary">Register New Claim (FNOL)</button>
    </section>

    <div id="claimFormWrap" class="form-card" style="display:none;">
      <h3>Register Claim</h3>
      <form id="claimForm">
        <div class="form-row">
          <label>Policy Number</label>
          <input type="text" id="claimPolicyNo" placeholder="POL-2025-001" required />
        </div>
        <div class="form-row">
          <label>Date of Loss</label>
          <input type="date" id="claimLossDate" required />
        </div>
        <div class="form-row">
          <label>Loss Description</label>
          <textarea id="claimDescription" rows="4" required></textarea>
        </div>
        <div class="form-row">
          <button type="submit" class="btn btn-primary">Save Claim</button>
          <button type="button" id="cancelClaimBtn" class="btn btn-secondary">Cancel</button>
        </div>
      </form>
    </div>

    <table id="claimsTable" class="data-table">
      <thead>
        <tr>
          <th>Claim #</th>
          <th>Policy</th>
          <th>Customer</th>
          <th>Loss Date</th>
          <th>Status</th>
          <th>Reserve</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

  </main>

  <script>
        // DUMMY DATA FOR CLAIMS PAGE
    window.data = {
      branches: [
        { id: 1, name: "Head Office – Blantyre", code: "BO" },
        { id: 2, name: "Lilongwe Branch", code: "LW" },
        { id: 3, name: "Mzuzu Branch", code: "MZ" }
      ],
      claims: [
        { id: 201, claimNo: "CLM-2025-001", policyNo: "POL-2025-001", customer: "Nyasa Insurance Agency", lossDate: "2025-03-15", status: "Registered", reserve: "MK 500,000" },
        { id: 202, claimNo: "CLM-2025-002", policyNo: "POL-2025-002", customer: "City Mall Ltd", lossDate: "2025-03-20", status: "Assessing", reserve: "MK 1,200,000" },
        { id: 203, claimNo: "CLM-2025-003", policyNo: "POL-2025-004", customer: "Rural Transport Co‑op", lossDate: "2025-03-25", status: "Approved", reserve: "MK 800,000" },
        { id: 204, claimNo: "CLM-2025-004", policyNo: "POL-2025-005", customer: "GreenGrocers Ltd", lossDate: "2025-03-28", status: "Closed", reserve: "MK 0" }
      ]
    };

    // APP LOGIC
    const app = {
      session: null,

      // Load stored session
      loadSession() {
        try {
          const s = localStorage.getItem("insuresuite-session");
          if (s) this.session = JSON.parse(s);
        } catch (e) {
          // ignore invalid JSON
        }
      },

      // Require valid session to show page
      requireSession() {
        if (!this.session) {
          window.location = "index.html";
          return false;
        }
        return true;
      },

      // Set role + branch in header
      setHeader() {
        const el = document.getElementById("sessionInfo");
        if (!el || !this.session) return;
        const branch = window.data.branches.find(b => b.id === this.session.branchId);
        el.textContent = `${this.session.role} • ${branch ? branch.name : "Unknown Branch"}`;
      },

      // Render claims table
      renderClaims() {
        const tbody = document.querySelector("#claimsTable tbody");
        if (!tbody) return;
        tbody.innerHTML = "";

        window.data.claims.forEach(claim => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${claim.claimNo}</td>
            <td>${claim.policyNo}</td>
            <td>${claim.customer}</td>
            <td>${claim.lossDate}</td>
            <td><span class="status-pill ${claim.status.toLowerCase()}">${claim.status}</span></td>
            <td>${claim.reserve}</td>
            <td>
              <button class="btn btn-xs btn-primary" data-id="${claim.id}" data-action="view">View</button>
              <button class="btn btn-xs btn-secondary" data-id="${claim.id}" data-action="approve">Approve</button>
            </td>
          `;
          tbody.appendChild(tr);
        });

        tbody.querySelectorAll("button[data-action]").forEach(btn => {
          btn.addEventListener("click", () => {
            const id = parseInt(btn.dataset.id);
            const claim = window.data.claims.find(x => x.id === id);
            if (!claim) return;

            if (btn.dataset.action === "view") {
              alert(`Claim ${claim.claimNo}
Policy: ${claim.policyNo}
Status: ${claim.status}
Reserve: ${claim.reserve}`);
            } else if (btn.dataset.action === "approve") {
              claim.status = "Approved";
              claim.reserve = "MK 0";
              this.renderClaims();
            }
          });
        });
      },

      // Claim form logic
      initForm() {
        const wrap  = document.getElementById("claimFormWrap");
        const form  = document.getElementById("claimForm");

        // Show form
        document.getElementById("newClaimBtn").addEventListener("click", () => {
          wrap.style.display = "block";
        });

        // Hide form
        document.getElementById("cancelClaimBtn").addEventListener("click", () => {
          wrap.style.display = "none";
        });

        // Submit new claim
        form.addEventListener("submit", (e) => {
          e.preventDefault();
          const newId = window.data.claims.reduce((m, c) => Math.max(m, c.id), 0) + 1;
          const policyNo = document.getElementById("claimPolicyNo").value.trim();
          const lossDate = document.getElementById("claimLossDate").value;
          const description = document.getElementById("claimDescription").value.trim();

          window.data.claims.push({
            id: newId,
            claimNo: `CLM-${Date.now().toString().slice(-6)}`,
            policyNo,
            customer: "Demo Customer",
            lossDate,
            status: "Registered",
            reserve: "MK 0",
            description
          });

          form.reset();
          wrap.style.display = "none";
          this.renderClaims();
        });
      },

      // Initialize page
      init() {
        this.loadSession();
        if (!this.requireSession()) return;
        this.setHeader();
        this.renderClaims();
        this.initForm();
      }
    };

    // Run on page load
    document.addEventListener("DOMContentLoaded", () => app.init());
  </script>
</body>
</html>
