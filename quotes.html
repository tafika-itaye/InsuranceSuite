<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Get a Quote | InsureSuite</title>
  <link rel="stylesheet" href="css/style.css">
  
</head>
<body>
<nav class="nav">
  <div class="nav-brand">Insure<span>Suite</span></div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="login.html" class="nav-cta">Login</a></li>
  </ul>
  <button class="nav-toggle"><span></span><span></span><span></span></button>
</nav>

<section style="max-width:680px;margin:0 auto;padding:60px 5%;">
  <div class="section-title">
    <h2>Get a Free Quote</h2>
    <p>Tell us about yourself and we'll prepare a personalised insurance quote within 24 hours.</p>
  </div>

  <div class="card">
    <div id="quoteSuccess" style="display:none;background:#dcfce7;color:#166534;padding:1rem;border-radius:8px;margin-bottom:1.5rem;">
      ✅ Thank you! Your quote request has been submitted. Our team will contact you within 24 hours.
    </div>
    <form id="quoteForm">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
        <div class="form-group"><label>First Name</label><input type="text" placeholder="Chisomo" required></div>
        <div class="form-group"><label>Last Name</label><input type="text" placeholder="Banda" required></div>
      </div>
      <div class="form-group"><label>Email Address</label><input type="email" placeholder="you@example.mw" required></div>
      <div class="form-group"><label>Phone Number</label><input type="tel" placeholder="+265 9XX XXX XXX" required></div>
      <div class="form-group">
        <label>Insurance Type</label>
        <select required>
          <option value="">— Select product —</option>
          <option>Motor Insurance</option>
          <option>Health Insurance</option>
          <option>Life Insurance</option>
          <option>Property Insurance</option>
          <option>Travel Insurance</option>
          <option>Business Insurance</option>
        </select>
      </div>
      <div class="form-group">
        <label>Estimated Budget (MWK / month)</label>
        <select>
          <option>Under MK 10,000</option>
          <option>MK 10,000 – 30,000</option>
          <option>MK 30,000 – 80,000</option>
          <option>MK 80,000 – 200,000</option>
          <option>Over MK 200,000</option>
        </select>
      </div>
      <div class="form-group"><label>Additional Notes</label><textarea placeholder="Any specific requirements or questions..."></textarea></div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Submit Quote Request →</button>
    </form>
  </div>
</section>

<footer style="background:var(--primary);text-align:center;padding:1.5rem;color:rgba(255,255,255,.5);font-size:.85rem;">
  © 2026 InsureSuite Malawi. <a href="index.html" style="color:var(--accent);">Back to Home</a>
</footer>
<script src="js/app.js"></script></body></html>
