<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Broker Partners | InsureSuite</title>
  <link rel="stylesheet" href="css/style.css">
  
</head>
<body><div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">Insure<span>Suite</span></div>
      <ul class="sidebar-nav">
        <li class="nav-section">Main</li>
        <li><a href="dashboard.html">🏠 Dashboard</a></li>
        <li class="nav-section">Insurance</li>
        <li><a href="policies.html">📋 Policies</a></li>
        <li><a href="claims.html">🛡️ Claims</a></li>
        <li><a href="customers.html">👥 Customers</a></li>
        <li><a href="brokers.html">🤝 Brokers</a></li>
        <li class="nav-section">Public</li>
        <li><a href="quotes.html">💬 Get a Quote</a></li>
        <li><a href="index.html">🌐 Public Site</a></li>
        <li class="nav-section">Account</li>
        <li><a href="#" class="logout-btn">🔓 Logout</a></li>
      </ul>
    </aside>
<div class="main-content">

    <div class="top-bar">
      <div style="display:flex;align-items:center;gap:1rem;">
        <button id="sideToggle" style="background:none;border:none;font-size:1.4rem;cursor:pointer;">☰</button>
        <span class="top-bar-title">Broker Partners</span>
      </div>
      <div class="user-chip">
        <div class="avatar">TI</div>
        <span style="font-size:.85rem;color:#6b7c93;">Tafika Itaye &nbsp;|&nbsp; Admin</span>
        <a href="#" class="logout-btn" style="font-size:.8rem;color:#e63946;margin-left:.5rem;">Logout</a>
      </div>
    </div>
<div class="card">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem;flex-wrap:wrap;gap:.8rem;">
    <div class="pill-row" style="margin:0;">
      <span class="pill active" onclick="filterTable('')">All</span>
      
    </div>
    <input type="text" id="searchBox" placeholder="🔍 Search..." style="width:220px;padding:.5rem .8rem;font-size:.85rem;">
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>ID</th><th>Name</th><th>Contact</th><th>Phone</th><th>Policies</th><th>Commission</th><th>Status</th></tr></thead>
      <tbody id="brokersTable"></tbody>
    </table>
  </div>
</div>
</div>
</div>
<script>
function filterTable(val){
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  event.target.classList.add('active');
  document.querySelectorAll('#brokersTable tr').forEach(r=>{
    r.style.display = val===''||r.textContent.toLowerCase().includes(val) ? '' : 'none';
  });
}
document.addEventListener('input',()=>{
  const q=document.getElementById('searchBox').value.toLowerCase();
  document.querySelectorAll('#brokersTable tr').forEach(r=>{
    r.style.display=r.textContent.toLowerCase().includes(q)?'':'none';
  });
});
</script>
<script src="js/data.js"></script><script src="js/app.js"></script></body></html>
