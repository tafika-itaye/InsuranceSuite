<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InsureSuite – Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">

  <!-- SPLASH SCREEN LAYER -->
  <div id="splashScreen" class="splash">
    <div class="splash-logo">InsureSuite</div>
    <div class="splash-tag">Mid‑Tier Insurance Operations Suite – TechNexus Malawi</div>
    <button id="splashContinueBtn" class="btn btn-primary">Continue</button>
  </div>

  <!-- LOGIN LAYER (hidden until splash ends) -->
  <div id="mainContent" style="display:none;">
    <div class="login-container">
      <header>
        <h1>InsureSuite</h1>
        <p>Mid‑Tier Insurance Operations Suite</p>
      </header>

      <form id="loginForm" class="login-form">
        <h2>Select User Role</h2>

        <div class="form-group">
          <label for="branchSelect">Branch</label>
          <select id="branchSelect" required>
            <!-- filled by JS -->
          </select>
        </div>

        <div class="form-group">
          <label for="roleSelect">Role</label>
          <select id="roleSelect" required>
            <option value="">-- Select Role --</option>
            <option value="SuperAdmin">Super Admin</option>
            <option value="BranchManager">Branch Manager</option>
            <option value="Underwriter">Underwriter</option>
            <option value="ClaimsHandler">Claims Handler</option>
            <option value="FrontDesk">Front Desk</option>
            <option value="ReadOnly">Read‑Only</option>
          </select>
        </div>

        <button type="submit" class="btn btn-primary">Start Session</button>

        <div class="dashboard-link">
          Already logged in? <a href="dashboard.html">Go straight to Dashboard</a>
        </div>
      </form>
    </div>
  </div>

  <script>
    // === DUMMY DATA ===
    window.data = {

        { id: 4, name: "Grace Banda",       role: "ClaimsHandler", branch: 1 },
        { id: 5, name: "Paul Mwale",        role: "FrontDesk",    branch: 3 },
        { id: 6, name: "Linda Phiri",       role: "ReadOnly",     branch: 2 }
      ]
    };

    // === APP LOGIC ===
    const app = {
      loadBranchDropdown() {
        const sel = document.getElementById("branchSelect");
        if (!sel || !window.data || !window.data.branches) return;

        window.data.branches.forEach(br => {
          const opt = document.createElement("option");
          opt.value = br.id;
          opt.textContent = br.name;
          sel.appendChild(opt);
        });

        if (sel.options.length > 0) sel.selectedIndex = 0;
      },

      initLogin() {
        const form = document.getElementById("loginForm");
        if (!form) return;

        form.addEventListener("submit", (e) => {
          e.preventDefault();
          const branchSelect = document.getElementById("branchSelect");
          const roleSelect   = document.getElementById("roleSelect");

          const branchId = parseInt(branchSelect.value);
          const role     = roleSelect.value;

          if (!branchId || !role) {
            alert("Select branch and role.");
            return;
          }

          const user = window.data.users.find(u => u.role === role && u.branch === branchId);
          if (!user) {
            alert("No matching user for that role and branch.");
            return;
          }

          const sess = { branchId, role, userId: user.id };
          localStorage.setItem("insuresuite-session", JSON.stringify(sess));
          window.location = "dashboard.html";
        });
      },

      initSplash() {
        const splash  = document.getElementById("splashScreen");
        const main    = document.getElementById("mainContent");
        splash.style.display = "flex";
        main.style.disp
    .form-group label {
      display: block;
      margin-bottom: 0.25rem;
      font-weight: 500;
      color: #003366;
    }

    select,
    input,
    button {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border: 1px solid #d1d7e0;
      border-radius: 0.25rem;
      font-size: 0.95rem;
      color: #212529;
    }

    select:focus,
    input:focus {
      outline: none;
      border-color: #007bff;
    }

    .btn-primary {
      background: #007bff;
      color: #fff;
      border: none;
    }

    .btn-primary:hover {
      background: #0069d9;
    }

    /* Dashboard link */
    .dashboard-link {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.9rem;
    }

    .dashboard-link a {
      color: #003366;
      text-decoration: underline;
    }
  </style>
</head>
<body>

    <button id="splashContinueBtn" class="splash-btn">

  </div>

  <!-- Main login content -->
  <div id="mainContent" class="app-content" style="display:none;">
    <div class="login-container">
      <header>

      <form id="loginForm" class="login-form">
        <h2>Select User Role</h2>

        <div class="form-group">
          <label for="branchSelect">Branch</label>
          <select id="branchSelect" required>
            <!-- JS will fill options -->
          </select>
        </div>

        <div class="form-group">
          <label for="roleSelect">Role</label>
          <select id="roleSelect" required>
            <option value="">-- Select Role --</option>
            <option value="SuperAdmin">Super Admin</option>
            <option value="BranchManager">Branch Manager</option>
            <option value="Underwriter">Underwriter</option>
            <option value="ClaimsHandler">Claims Handler</option>
            <option value="FrontDesk">Front Desk</option>
            <option value="ReadOnly">Read‑Only</option>
          </select>
        </div>

        <button type="submit" class="btn btn-primary">Start Session</button>

        <div class="dashboard-link">
          Already logged in? <a href="dashboard.html">Go straight to Dashboard</a>
        </div>
      </form>
    </div>
  </div>

  <!-- Dummy data -->

  <!-- App logic -->
  <script>
    const app = {
      init: function () {
        this.loadBranchDropdown();
        this.initLogin();
      },

      loadBranchDropdown: function () {
        const sel = document.getElementById("branchSelect");
        const data = window.data;

        if (!sel || !data || !data.branches) return;

        data.branches.forEach(br => {
          const opt = document.createElement("option");
          opt.value = br.id;
          opt.textContent = br.name;
          sel.appendChild(opt);
        });

        if (sel.options.length > 0) {
          sel.selectedIndex = 0;
        }
      },

      initLogin: function () {
        const form = document.getElementById("loginForm");
        if (!form) return;

        form.addEventListener("submit", (e) => {
          e.preventDefault();

          const branchSelect = document.getElementById("branchSelect");
          const roleSelect   = document.getElementById("roleSelect");

          const branchId = parseInt(branchSelect.value);
          const role     = roleSelect.value;

          if (!branchId || !role) {
            alert("Please select both branch and role.");
            return;
          }

          const user = window.data.users.find(u => u.role === role && u.branch === branchId);
          if (!user) {
            alert("No user found for this role and branch.");
            return;
          }

          const sess = {
            branchId: branchId,
            role: role,
            userId: user.id,
            timestamp: Date.now()
          };
          localStorage.setItem("insuresuite-session", JSON.stringify(sess));

          window.location = "dashboard.html";
        });
      }
    };

    // Run when the DOM is ready
    document.addEventListener("DOMContentLoaded", () => {
      const splash  = document.getElementById("splashScreen");
      const btn     = document.getElementById("splashContinueBtn");

      btn.addEventListener("click", () => {
        splash.style.display = "none";
        document.getElementById("mainContent").style.display = "block";
      });

      // Auto‑hide splash after 3 seconds
      setTimeout(() => {
        splash.style.display = "none";
        document.getElementById("mainContent").style.display = "block";
      }, 3000);
    });
  </script>
</body>
</html>
