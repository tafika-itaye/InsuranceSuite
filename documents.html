<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InsureSuite – Documents</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="documents-page">
  <header class="suite-header">
    <h1>InsureSuite</h1>
    <div class="user-nav">
      <span id="currentRole"></span> •
      <a href="index.html" id="logoutBtn">Logout</a>
    </div>
  </header>

  <nav class="main-menu">
    <a href="dashboard.html" class="menu-item">Dashboard</a>
    <a href="claims.html" class="menu-item">Claims</a>
    <a href="policies.html" class="menu-item">Policies</a>
    <a href="crm.html" class="menu-item">CRM & Renewals</a>
    <a href="portfolio.html" class="menu-item">Portfolio</a>
    <a href="documents.html" class="menu-item active">Documents</a>
    <a href="admin.html" class="menu-item">Admin</a>
  </nav>

  <main class="documents-main">
    <section class="section-header">
      <h2>Document & Records Management</h2>
      <button id="newDocBtn" class="btn btn-primary">Upload New Document</button>
    </section>

    <div id="uploadForm" class="form-card" style="display:none;">
      <h3>Upload Document</h3>
      <form id="documentForm">
        <div class="form-row">
          <label>Document Title</label>
          <input type="text" id="docTitle" required />
        </div>
        <div class="form-row">
          <label>Type / Category</label>
          <select id="docCategory" required>
            <option value="Policy">Policy</option>
            <option value="Claim">Claim</option>
            <option value="Customer">Customer</option>
            <option value="General">General</option>
          </select>
        </div>
        <div class="form-row">
          <label>Related ID</label>
          <input type="text" id="docEntityId" placeholder="e.g. POL-2025-001, CLM-2025-002" />
        </div>
        <div class="form-row">
          <label>File (Simulated)</label>
          <input type="file" id="docFile" />
        </div>
        <div class="form-row">
          <button type="submit" class="btn btn-primary">Upload Document</button>
          <button type="button" id="cancelDocBtn" class="btn btn-secondary">Cancel</button>
        </div>
      </form>
    </div>

    <table id="documentsTable" class="data-table">
      <thead>
        <tr>
          <th>Document</th>
          <th>Type</th>
          <th>Related</th>
          <th>Uploaded By</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </main>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      if (!app.hasSession()) {
        window.location = "index.html";
        return;
      }

      app.updateMainMenu();

      const currentRole = document.getElementById("currentRole");
      if (currentRole && app.currentSession) {
        currentRole.textContent = app.currentSession.role;
      }

      window.data.documents = [
        { id: 1, title: "Policy Schedule POL-2025-001", category: "Policy", entityId: "101", branch: 1, uploadedBy: "Underwriter 1" },
        { id: 2, title: "Claim Scene Photos CLM-2025-002", category: "Claim", entityId: "202", branch: 1, uploadedBy: "Claims Handler 1" },
        { id: 3, title: "Renewal Quotation POL-2025-004", category: "Policy", entityId: "104", branch: 3, uploadedBy: "Underwriter 2" },
        { id: 4, title: "Customer Consent Form", category: "Customer", entityId: "C001", branch: 2, uploadedBy: "Front Desk 1" },
        { id: 5, title: "Watermarking Policy PDF", category: "General", entityId: "GEN-001", branch: 1, uploadedBy: "Compliance Officer" },
      ];

      // Toggle upload form
      const newDocBtn = document.getElementById("newDocBtn");
      const uploadForm = document.getElementById("uploadForm");
      const cancelDocBtn = document.getElementById("cancelDocBtn");

      newDocBtn.addEventListener("click", () => {
        uploadForm.style.display = "block";
      });

      cancelDocBtn.addEventListener("click", () => {
        uploadForm.style.display = "none";
      });

      // Upload document (simulated)
      const documentForm = document.getElementById("documentForm");
      documentForm.addEventListener("submit", (e) => {
        e.preventDefault();

        const title      = document.getElementById("docTitle").value.trim();
        const category   = document.getElementById("docCategory").value;
        const entityId   = document.getElementById("docEntityId").value.trim();

        const maxId = Math.max(...window.data.documents.map(d => d.id)) + 10;
        window.data.documents.push({
          id: maxId,
          title: title,
          category: category,
          entityId: entityId,
          branch: app.currentSession?.branchId || 1,
          uploadedBy: `Simulated ${app.currentSession?.role} (${app.currentSession?.userId})`
        });

        documentForm.reset();
        uploadForm.style.display = "none";
        renderDocumentsTable();
      });

      // Render documents table
      const docsTable = document.querySelector("#documentsTable tbody");
      function renderDocumentsTable() {
        docsTable.innerHTML = "";

        window.data.documents.forEach(doc => {
          const tr = document.createElement("tr");
          tr.innerHTML = [
            `<td class="nowrap">${doc.title}</td>`,
            `<td class="nowrap">${doc.category}</td>`,
            `<td class="nowrap">${doc.entityId}</td>`,
            `<td class="nowrap">${doc.uploadedBy}</td>`,
            `<td>
              <button class="btn btn-xs btn-primary" data-doc="${doc.id}">View</button>
              <button class="btn btn-xs btn-secondary" data-doc="${doc.id}">Delete</button>
            </td>`
          ].join("");
          docsTable.appendChild(tr);
        });

        docsTable.querySelectorAll("button").forEach(btn => {
          btn.addEventListener("click", (e) => {
            const docId = e.target.getAttribute("data-doc");
            const doc = window.data.documents.find(d => d.id === parseInt(docId));
            if (!doc) return;

            if (e.target.textContent === "View") {
              alert(`Viewing document: ${doc.title} (type: ${doc.category})`);
            } else if (e.target.textContent === "Delete") {
              if (confirm(`Delete document "${doc.title}"?`)) {
                window.data.documents = window.data.documents.filter(d => d.id !== doc.id);
                renderDocumentsTable();
              }
            }
          });
        });
      }

      renderDocumentsTable();
    });
  </script>
</body>
</html>
